<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<title>Venus Fleur</title>

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #0a0a0a;
    color: #eee;
}

/* LOGO */
.logo {
    position: fixed;
    top: 25px;
    right: 30px;
    color: #c6a75e;
    font-size: 20px;
    letter-spacing: 2px;
}

/* CONTAINER */
.container {
    max-width: 950px;
    margin: auto;
    padding: 120px 20px;
    text-align: center;
}

h1 {
    font-size: 48px;
    letter-spacing: 5px;
}

.gold {
    color: #c6a75e;
}

.subtitle {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 3px;
    margin-top: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-top: 80px;
}

/* CARD */
.card {
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.card img {
    width: 100%;
    height: 450px;
    object-fit: cover;
    transition: 0.5s;
}

.card:hover img {
    transform: scale(1.03);
}

/* CONTENT */
.card-content {
    padding: 20px;
    background: #111;
}

.card-content h3 {
    margin: 0;
}

.price {
    color: #c6a75e;
    margin-top: 8px;
    font-size: 16px;
}

/* BUTTON */
.btn {
    display: block;
    margin-top: 15px;
    padding: 14px;
    background: linear-gradient(135deg, #c6a75e, #e6c97a);
    color: black;
    font-weight: 600;
    text-decoration: none;
    border-radius: 30px;
    text-align: center;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.03);
}

/* PARTY */
.party {
    margin-top: 120px;
    position: relative;
}

.party img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 14px;
}

.party-text {
    position: absolute;
    bottom: 40px;
    left: 40px;
    text-align: left;
}

.party-text h2 {
    font-size: 40px;
    margin: 0;
}

.party-text p {
    font-size: 14px;
    color: #ddd;
}

/* WHATSAPP FLOAT */
.whatsapp {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    font-size: 22px;
    text-decoration: none;
}

/* MOBILE */
@media(max-width:768px){
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<div class="logo">VF</div>

<div class="container">

<h1>VENUS <span class="gold">FLEUR</span></h1>
<div class="subtitle">LUXURY FLOWER BOXES • DUBAI</div>

<div class="grid">

<!-- WHITE -->
<div class="card">
    <img src="white.jpg">
    <div class="card-content">
        <h3>White Elegance</h3>
        <div class="price">550 AED</div>
        <a href="https://wa.me/212712648363?text=Hello,%20I%20want%20to%20order%20White%20Elegance" target="_blank" class="btn">
            Order via WhatsApp
        </a>
    </div>
</div>

<!-- BLACK -->
<div class="card">
    <img src="black.jpg">
    <div class="card-content">
        <h3>Royal Red</h3>
        <div class="price">650 AED</div>
        <a href="https://wa.me/212712648363?text=Hello,%20I%20want%20to%20order%20Royal%20Red" target="_blank" class="btn">
            Order via WhatsApp
        </a>
    </div>
</div>

</div>

<!-- PARTY -->
<div class="party">
    <img src="party.jpg">
    <div class="party-text">
        <h2>Moments of Luxury</h2>
        <p>Designed to impress, created to last</p>
    </div>
</div>

</div>

<a href="https://wa.me/212712648363" target="_blank" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
