<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<title>Venus Fleur</title>

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #0a0a0a;
    color: #eee;
}

/* SMOOTH */
* {
    transition: all 0.4s ease;
}

/* CONTAINER */
.container {
    max-width: 950px;
    margin: auto;
    padding: 100px 20px;
    text-align: center;
}

/* TITLE */
h1 {
    font-size: 48px;
    letter-spacing: 5px;
    font-weight: 500;
}

.gold {
    color: #c6a75e;
}

.subtitle {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 3px;
    margin-top: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 50px;
    margin-top: 100px;
}

/* CARD */
.card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 450px;
    object-fit: cover;
    transition: 0.6s;
}

/* OVERLAY */
.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

/* HOVER */
.card:hover img {
    transform: scale(1.05);
}

/* CONTENT */
.card-content {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
}

/* TEXT */
.card h3 {
    font-size: 24px;
    margin: 0;
}

.price {
    color: #c6a75e;
    margin: 10px 0;
    font-size: 18px;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 20px;
    border: 1px solid #c6a75e;
    color: #c6a75e;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 2px;
}

.btn:hover {
    background: #c6a75e;
    color: black;
}

/* FADE ANIMATION */
.fade {
    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* PARTY */
.party {
    margin-top: 140px;
}

.party img {
    width: 100%;
    height: 420px;
    object-fit: cover;
    border-radius: 14px;
    opacity: 0.9;
}

/* FOOTER */
.footer {
    margin-top: 100px;
    font-size: 12px;
    color: #777;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #c6a75e;
    color: black;
    padding: 15px 18px;
    border-radius: 50%;
    font-size: 20px;
    text-decoration: none;
}
.whatsapp:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="container fade">

    <h1>VENUS <span class="gold">FLEUR</span></h1>
    <div class="subtitle">LUXURY FLOWER BOXES • DUBAI</div>

    <!-- PRODUCTS -->
    <div class="grid">

        <!-- WHITE -->
        <div class="card fade">
            <img src="white.jpg">
            <div class="card-content">
                <h3>White Elegance</h3>
                <p class="price">550 AED</p>
                <a href="https://wa.me/212712648363?text=Order%20White%20Box" class="btn">ORDER</a>
            </div>
        </div>

        <!-- BLACK -->
        <div class="card fade">
            <img src="black.jpg">
            <div class="card-content">
                <h3>Royal Red</h3>
                <p class="price">650 AED</p>
                <a href="https://wa.me/212712648363?text=Order%20Black%20Box" class="btn">ORDER</a>
            </div>
        </div>

    </div>

    <!-- EXPERIENCE -->
    <div class="party fade">
        <img src="party.jpg">
    </div>

    <div class="footer">
        VENUS FLEUR — DUBAI EDITION
    </div>

</div>

<!-- WHATSAPP BUTTON -->
<a href="https://wa.me/212712648363" class="whatsapp" target="_blank">??</a>

</body>
</html>
