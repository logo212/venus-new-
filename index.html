<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<!-- WhatsApp icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<title>Venus Fleur</title>

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #0a0a0a;
    color: #eee;
}

* {
    transition: all 0.6s ease;
}

.container {
    max-width: 950px;
    margin: auto;
    padding: 100px 20px;
    text-align: center;
}

h1 {
    font-size: 48px;
    letter-spacing: 5px;
    text-shadow: 0 0 10px rgba(198,167,94,0.2);
}

.gold {
    color: #c6a75e;
}

.subtitle {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 3px;
    margin-top: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 50px;
    margin-top: 100px;
}

/* CARD */
.card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
}

.card img {
    width: 100%;
    height: 450px;
    object-fit: cover;
}

.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

.card-content {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
}

.price {
    color: #c6a75e;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 12px 22px;
    border: 1px solid #c6a75e;
    color: #c6a75e;
    text-decoration: none;
    letter-spacing: 2px;
    margin-top: 10px;
}

.btn:hover {
    background: #c6a75e;
    color: black;
}

/* PARTY SECTION */
.party {
    margin-top: 140px;
    position: relative;
}

.party img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 14px;
}

/* TEXT فوق الصورة */
.party-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
}

.party-text h2 {
    font-size: 36px;
    letter-spacing: 3px;
}

.party-text p {
    color: #ddd;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #25D366;
    color: white;
    padding: 16px;
    border-radius: 50%;
    font-size: 22px;
    text-decoration: none;
}

/* FOOTER */
.footer {
    margin-top: 100px;
    font-size: 12px;
    color: #777;
}
</style>
</head>

<body>

<div class="container">

    <h1>VENUS <span class="gold">FLEUR</span></h1>
    <div class="subtitle">LUXURY FLOWER BOXES • DUBAI</div>

    <!-- PRODUCTS -->
    <div class="grid">

        <div class="card">
            <img src="white.png">
            <div class="card-content">
                <h3>White Elegance</h3>
                <p class="price">550 AED</p>
                <a href="https://wa.me/212712648363?text=Order%20White%20Box" class="btn" target="_blank">ORDER</a>
            </div>
        </div>

        <div class="card">
            <img src="black.png">
            <div class="card-content">
                <h3>Royal Red</h3>
                <p class="price">650 AED</p>
                <a href="https://wa.me/212712648363?text=Order%20Black%20Box" class="btn" target="_blank">ORDER</a>
            </div>
        </div>

    </div>

    <!-- PARTY SECTION -->
    <div class="party">
        <img src="party.png">
        <div class="party-text">
            <h2>Moments of Luxury</h2>
            <p>Designed to impress. Delivered with elegance.</p>
        </div>
    </div>

    <div class="footer">
        VENUS FLEUR — DUBAI EDITION
    </div>

</div>

<!-- WhatsApp Button -->
<a href="https://wa.me/212712648363" class="whatsapp" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
