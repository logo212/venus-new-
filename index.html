<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<!-- WhatsApp icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<title>Venus Fleur</title>

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: #0a0a0a;
    color: #eee;
}

* {
    transition: all 0.5s ease;
}

.container {
    max-width: 950px;
    margin: auto;
    padding: 100px 20px;
    text-align: center;
}

h1 {
    font-size: 48px;
    letter-spacing: 5px;
    color: white;
}

.gold {
    color: #c6a75e;
}

.subtitle {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 3px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    margin-top: 80px;
}

/* CARD */
.card {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 450px;
    object-fit: cover;
    display: block;
}

/* overlay */
.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

/* hover zoom */
.card:hover img {
    transform: scale(1.05);
}

/* content */
.card-content {
    position: absolute;
    bottom: 30px;
    left: 0;
    right: 0;
}

.price {
    color: #c6a75e;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 12px 25px;
    border: 1px solid #c6a75e;
    color: #c6a75e;
    text-decoration: none;
    margin-top: 10px;
}

.btn:hover {
    background: #c6a75e;
    color: black;
}

/* PARTY */
.party {
    margin-top: 120px;
    position: relative;
}

.party img {
    width: 100%;
    height: 520px;
    object-fit: cover;
    border-radius: 15px;
}

.party-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.party-text h2 {
    font-size: 36px;
}

.party-text p {
    color: #ddd;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #25D366;
    color: white;
    padding: 16px;
    border-radius: 50%;
    font-size: 22px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

    <h1>VENUS <span class="gold">FLEUR</span></h1>
    <div class="subtitle">LUXURY FLOWER BOXES • DUBAI</div>

    <div class="grid">

        <!-- WHITE -->
        <div class="card">
            <img src="./white.png">
            <div class="card-content">
                <h3>White Elegance</h3>
                <p class="price">550 AED</p>
                <a href="https://wa.me/212712648363?text=Hello%20I%20want%20White%20Box" target="_blank" class="btn">ORDER</a>
            </div>
        </div>

        <!-- BLACK -->
        <div class="card">
            <img src="./black.png">
            <div class="card-content">
                <h3>Royal Red</h3>
                <p class="price">650 AED</p>
                <a href="https://wa.me/212712648363?text=Hello%20I%20want%20Black%20Box" target="_blank" class="btn">ORDER</a>
            </div>
        </div>

    </div>

    <!-- PARTY -->
    <div class="party">
        <img src="./party.png">
        <div class="party-text">
            <h2>Moments of Luxury</h2>
            <p>Order now via WhatsApp</p>
        </div>
    </div>

</div>

<!-- WhatsApp -->
<a href="https://wa.me/212712648363" target="_blank" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

</body>
</html>
